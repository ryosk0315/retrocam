<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RetroCam</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#161616;--border:rgba(255,255,255,0.08);
  --text:#f0f0f0;--muted:#555;--accent:#7f6fe0;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;overflow:hidden;}

#shoot-mode{position:fixed;inset:0;display:flex;flex-direction:column;}

#cam-bg{position:absolute;inset:0;background:#000;overflow:hidden;}
#cam-bg video{width:100%;height:100%;object-fit:cover;display:none;}
#cam-bg canvas.filter-cv{position:absolute;inset:0;width:100%;height:100%;display:none;}
#cam-bg canvas.overlay-cv{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:none;}
#cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:5;transition:opacity .05s;}

/* top bar - portrait */
#top-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:52px 20px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
  z-index:10;
}
/* top bar - landscape */
@media (orientation:landscape){
  #top-bar{padding:12px 20px 12px 12px;}
}

.dev-tabs{
  display:flex;gap:4px;background:rgba(0,0,0,0.4);
  border:0.5px solid rgba(255,255,255,0.12);border-radius:20px;padding:3px;
  backdrop-filter:blur(8px);
}
.dev-tab{border:none;background:transparent;border-radius:16px;
  padding:6px 14px;font-size:12px;font-weight:600;
  color:rgba(255,255,255,0.5);cursor:pointer;transition:all .15s;}
.dev-tab.active{background:rgba(255,255,255,0.15);color:#fff;}

#settings-btn{width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.4);border:0.5px solid rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);color:#fff;font-size:16px;}

/* bottom bar - portrait */
#bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 0 40px;
  background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
  z-index:10;
}
/* bottom bar - landscape: 右サイドバーに変える */
@media (orientation:landscape){
  #bottom-bar{
    top:0;right:0;bottom:0;left:auto;width:100px;
    padding:0;
    background:linear-gradient(to left,rgba(0,0,0,0.7),transparent);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    padding-bottom:24px;gap:16px;
  }
  #gallery-strip{
    flex-direction:column !important;
    overflow-x:hidden !important;
    overflow-y:auto !important;
    padding:0 0 0 0 !important;
    max-height:40vh;
  }
  #shutter-row{flex-direction:column !important;gap:16px !important;padding:0 !important;}
}

#gallery-strip{display:flex;gap:6px;padding:0 20px 12px;overflow-x:auto;scrollbar-width:none;}
#gallery-strip::-webkit-scrollbar{display:none;}
.strip-thumb{width:52px;height:52px;flex-shrink:0;object-fit:cover;border-radius:6px;
  border:1.5px solid rgba(255,255,255,0.2);cursor:pointer;}
.strip-hint{width:52px;height:52px;flex-shrink:0;border-radius:6px;
  border:1px dashed rgba(255,255,255,0.2);display:flex;align-items:center;
  justify-content:center;font-size:9px;color:rgba(255,255,255,0.3);
  text-align:center;line-height:1.3;padding:4px;}

#shutter-row{display:flex;align-items:center;justify-content:center;gap:32px;padding:0 20px;}

.icon-btn{width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.12);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:18px;transition:transform .1s;}
.icon-btn:active{transform:scale(0.9);}

#shutter-btn{width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.95);border:3px solid rgba(255,255,255,0.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s;box-shadow:0 0 0 2px rgba(255,255,255,0.2);}
#shutter-btn:active{transform:scale(0.91);}
#shutter-inner{width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,0.9);border:2px solid rgba(0,0,0,0.1);
  transition:background .15s,border-radius .15s;}
#shutter-btn.recording #shutter-inner{
  background:#ff3b3b;border-radius:8px;width:36px;height:36px;}

/* rec indicator */
#rec-indicator{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:none;align-items:center;gap:6px;z-index:10;
  background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:12px;
  backdrop-filter:blur(4px);
}
#rec-indicator.show{display:flex;}
#rec-dot{width:8px;height:8px;border-radius:50%;background:#ff3b3b;
  animation:recblink 1s infinite;}
@keyframes recblink{0%,100%{opacity:1}50%{opacity:0.2}}
#rec-time{font-family:'Courier New',monospace;font-size:12px;font-weight:600;color:#fff;}

#device-label{position:absolute;top:110px;left:0;right:0;
  display:flex;justify-content:center;pointer-events:none;z-index:10;}
@media (orientation:landscape){#device-label{top:12px;}}
#device-label span{font-family:'Courier New',monospace;font-size:10px;font-weight:600;
  color:rgba(255,255,255,0.5);letter-spacing:2px;background:rgba(0,0,0,0.3);
  padding:3px 10px;border-radius:10px;backdrop-filter:blur(4px);}

#no-cam{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:8;}
#no-cam p{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;}
#start-btn{background:var(--accent);color:#fff;border:none;border-radius:22px;
  padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;}

/* zoom */
#zoom-indicator{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.5);color:#fff;font-family:'Courier New',monospace;
  font-size:12px;font-weight:600;padding:4px 12px;border-radius:12px;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:10;
  backdrop-filter:blur(4px);letter-spacing:0.5px;}
@media (orientation:landscape){#zoom-indicator{bottom:auto;top:60px;}}

/* settings */
#settings-panel{position:absolute;inset:0;background:rgba(0,0,0,0.88);
  backdrop-filter:blur(12px);z-index:20;display:none;flex-direction:column;
  padding:60px 24px 40px;gap:16px;}
#settings-panel.open{display:flex;}
#settings-close{position:absolute;top:52px;right:20px;background:none;border:none;
  color:#fff;font-size:22px;cursor:pointer;}
#settings-panel h3{font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);
  letter-spacing:1px;text-transform:uppercase;}
.sl-row{display:flex;align-items:center;gap:12px;}
.sl-label{font-size:12px;color:var(--muted);width:60px;flex-shrink:0;}
.sl-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:rgba(255,255,255,0.15);border-radius:2px;cursor:pointer;}
.sl-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--accent);cursor:pointer;}
.sl-val{font-size:11px;font-family:'Courier New',monospace;color:var(--muted);width:28px;text-align:right;}

/* gallery mode */
#gallery-mode{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:30;}
#gallery-mode.open{display:flex;}
#gallery-header{display:flex;align-items:center;justify-content:space-between;
  padding:52px 20px 16px;border-bottom:0.5px solid var(--border);}
#gallery-header h2{font-size:16px;font-weight:600;}
#gallery-back{background:none;border:none;color:var(--text);font-size:14px;cursor:pointer;padding:4px 8px;}
#photo-viewer{flex:1;overflow-y:auto;display:flex;flex-direction:column;
  align-items:center;padding:20px 16px 32px;gap:20px;}

.gshell-3ds{width:280px;background:linear-gradient(180deg,#c8c0d8,#b8b0c8);
  border-radius:10px 10px 5px 5px;padding:8px 12px 6px;
  box-shadow:0 2px 0 #8880a0,0 5px 16px rgba(0,0,0,0.6);}
.gshell-3ds .gtop{background:linear-gradient(180deg,#d0c8e0,#b8b0c8);border-radius:8px 8px 3px 3px;
  padding:5px;border:1.5px solid #9890b0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.3);}
.gshell-3ds .ghinge{height:6px;background:#8880a0;margin:0 8px;}
.gshell-3ds .gbottom{background:linear-gradient(180deg,#c0b8d0,#b0a8c0);
  border-radius:3px 3px 12px 12px;padding:6px 8px 10px;border:1.5px solid #9890b0;border-top:none;}
.gshell-3ds .gcam-dot{width:5px;height:5px;border-radius:50%;background:#333;margin:0 auto 3px;}
.gshell-3ds .glabel{font-size:7px;color:#8880a0;text-align:center;letter-spacing:1px;margin-bottom:2px;}
.gshell-3ds .gscreen{background:#000;border-radius:3px;overflow:hidden;aspect-ratio:5/3;position:relative;}
.gshell-3ds .gspeakers{display:flex;justify-content:space-between;padding:2px 3px 0;}
.gshell-3ds .gspk{display:flex;gap:2px;}
.gshell-3ds .gspk-dot{width:2.5px;height:2.5px;border-radius:50%;background:#8880a0;opacity:0.7;}
.gshell-3ds .gbtns{display:flex;justify-content:space-between;align-items:center;padding:4px 0 0;}
.gshell-3ds .gcpad{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#555,#222);}
.gshell-3ds .gabxy{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.gshell-3ds .gabxy-btn{width:12px;height:12px;border-radius:50%;font-size:6px;
  display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5);}

.gshell-vita{width:300px;background:linear-gradient(180deg,#1a1a2e,#111122);
  border-radius:16px;padding:8px 6px 12px;box-shadow:0 4px 20px rgba(0,0,0,0.8);}
.gshell-vita .gvita-shoulder{display:flex;justify-content:space-between;padding:0 4px;margin-bottom:3px;}
.gshell-vita .gvita-sb{width:38px;height:7px;background:#222233;border-radius:3px;border:0.5px solid #333;}
.gshell-vita .gvita-main{display:flex;align-items:center;gap:5px;}
.gshell-vita .gvita-stick{width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#333,#111);border:1px solid #444;flex-shrink:0;}
.gshell-vita .gscreen{flex:1;background:#000;border-radius:3px;overflow:hidden;aspect-ratio:16/9;position:relative;border:1px solid #333;}
.gshell-vita .gvita-abxy{display:grid;grid-template-columns:1fr 1fr;gap:2px;flex-shrink:0;}
.gshell-vita .gvita-btn{width:12px;height:12px;border-radius:50%;font-size:6px;
  display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.5);}
.gshell-vita .gvita-led{width:5px;height:5px;border-radius:50%;background:#00c8ff;
  opacity:0.6;box-shadow:0 0 5px #00c8ff;position:absolute;top:6px;right:10px;}

.gshell-dsi{width:260px;background:linear-gradient(180deg,#e8e0c8,#d8d0b8);
  border-radius:12px 12px 7px 7px;padding:8px 10px 8px;
  box-shadow:0 2px 0 #b0a880,0 4px 12px rgba(0,0,0,0.4);}
.gshell-dsi .gdtop{background:linear-gradient(180deg,#f0e8d0,#ddd8c0);border-radius:8px 8px 2px 2px;
  padding:5px;border:1.5px solid #c0b890;}
.gshell-dsi .gdhinge{height:5px;background:#b0a880;margin:0 10px;}
.gshell-dsi .gdbottom{background:linear-gradient(180deg,#e0d8c0,#d0c8b0);
  border-radius:2px 2px 12px 12px;padding:5px 8px 8px;border:1.5px solid #c0b890;border-top:none;}
.gshell-dsi .gdlabel{font-size:6px;color:#a09870;text-align:right;letter-spacing:1px;font-weight:600;margin-bottom:2px;}
.gshell-dsi .gdcam{width:4px;height:4px;border-radius:50%;background:#333;margin:0 auto 2px;}
.gshell-dsi .gscreen{background:#000;border-radius:2px;overflow:hidden;aspect-ratio:4/3;position:relative;}

.gscreen img,.gscreen video{width:100%;height:100%;object-fit:cover;display:block;}

#gallery-grid{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
.ggrid-item{aspect-ratio:4/3;object-fit:cover;cursor:pointer;border-radius:2px;transition:opacity .12s;}
.ggrid-item:hover{opacity:0.8;}
.ggrid-selected{outline:2px solid var(--accent);}
#save-hint{font-size:11px;color:rgba(255,255,255,0.35);text-align:center;line-height:1.6;padding:0 20px;}

#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.8);color:#fff;font-size:12px;padding:8px 18px;
  border-radius:20px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;
  white-space:nowrap;backdrop-filter:blur(8px);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="shoot-mode">
  <div id="cam-bg">
    <video id="main-video" autoplay playsinline muted></video>
    <canvas class="filter-cv" id="main-fcv"></canvas>
    <canvas class="overlay-cv" id="main-ocv"></canvas>
    <div id="cam-flash"></div>
    <div id="rec-indicator">
      <div id="rec-dot"></div>
      <span id="rec-time">00:00</span>
    </div>
  </div>

  <div id="no-cam">
    <p>カメラへのアクセスを許可して<br>撮影をはじめてください</p>
    <button id="start-btn">カメラを起動する</button>
  </div>

  <div id="top-bar">
    <div class="dev-tabs">
      <button class="dev-tab active" data-device="3ds">3DS</button>
      <button class="dev-tab" data-device="vita">PS Vita</button>
      <button class="dev-tab" data-device="dsi">DSi</button>
    </div>
    <div id="settings-btn">⚙</div>
  </div>

  <div id="device-label"><span id="dev-label-txt">3DS CAM</span></div>
  <div id="zoom-indicator">1.0×</div>

  <div id="settings-panel">
    <button id="settings-close">✕</button>
    <h3>フィルター調整</h3>
    <div class="sl-row">
      <span class="sl-label">ノイズ</span>
      <input type="range" id="sl-noise" min="0" max="100" value="38" step="1">
      <span class="sl-val" id="sv-noise">38</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">解像度</span>
      <input type="range" id="sl-res" min="1" max="10" value="4" step="1">
      <span class="sl-val" id="sv-res">4</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">彩度</span>
      <input type="range" id="sl-sat" min="0" max="200" value="120" step="1">
      <span class="sl-val" id="sv-sat">120</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">コントラスト</span>
      <input type="range" id="sl-con" min="50" max="200" value="115" step="1">
      <span class="sl-val" id="sv-con">115</span>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="gallery-strip">
      <div class="strip-hint">長押しで<br>カメラロール<br>に保存</div>
    </div>
    <div id="shutter-row">
      <button class="icon-btn" id="flip-btn">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
          <path d="M1 4v6h6M23 20v-6h-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="shutter-btn"><div id="shutter-inner"></div></button>
      <button class="icon-btn" id="gallery-mode-btn">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" stroke="#fff" stroke-width="1.8"/>
          <rect x="14" y="3" width="7" height="7" rx="1" stroke="#fff" stroke-width="1.8"/>
          <rect x="3" y="14" width="7" height="7" rx="1" stroke="#fff" stroke-width="1.8"/>
          <rect x="14" y="14" width="7" height="7" rx="1" stroke="#fff" stroke-width="1.8"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div id="gallery-mode">
  <div id="gallery-header">
    <button id="gallery-back">← 戻る</button>
    <h2>ギャラリー</h2>
    <div style="width:60px"></div>
  </div>
  <div id="photo-viewer">
    <div id="shell-preview-wrap"></div>
    <div id="save-hint">長押し → 「写真に追加」でカメラロールに保存</div>
    <div id="gallery-grid"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===================== TONE CURVES =====================
function buildTC(pts) {
  const t=new Uint8Array(256);
  for(let i=0;i<256;i++){
    let lo=pts[0],hi=pts[pts.length-1];
    for(let j=0;j<pts.length-1;j++){
      if(i>=pts[j][0]&&i<=pts[j+1][0]){lo=pts[j];hi=pts[j+1];break;}
    }
    const r=lo[0]===hi[0]?0:(i-lo[0])/(hi[0]-lo[0]);
    t[i]=Math.max(0,Math.min(255,Math.round(lo[1]+r*(hi[1]-lo[1]))));
  }
  return t;
}
const TONE={
  '3ds':{
    r:buildTC([[0,18],[60,70],[128,132],[200,215],[255,245]]),
    g:buildTC([[0,14],[60,65],[128,128],[200,210],[255,240]]),
    b:buildTC([[0,22],[60,78],[128,140],[200,225],[255,252]]),
  },
  'vita':{
    r:buildTC([[0,4],[40,22],[100,105],[160,172],[210,230],[255,255]]),
    g:buildTC([[0,2],[40,18],[100,100],[160,168],[210,226],[255,255]]),
    b:buildTC([[0,0],[40,12],[100,92],[160,155],[210,210],[255,248]]),
  },
  'dsi':{
    r:buildTC([[0,8],[40,30],[128,130],[180,200],[220,240],[255,255]]),
    g:buildTC([[0,6],[40,25],[128,125],[180,192],[220,230],[255,248]]),
    b:buildTC([[0,4],[40,18],[128,118],[180,180],[220,215],[255,240]]),
  },
};
const JPEG_Q={'3ds':0.18,'vita':0.22,'dsi':0.12};
const DEV={
  '3ds':{label:'3DS CAM',tint:[-8,-4,22],colorNoise:true,highlight:0.05,
    vignette:0.55,lcd:true,noise:38,res:4,sat:120,con:115,
    softFocus:6,caAmount:2.5,hlThreshold:195,hlStrength:1.5,barrel:0.06},
  'vita':{label:'VITA CAM',tint:[12,4,-8],colorNoise:false,highlight:0.08,
    vignette:0.22,lcd:false,noise:24,res:5,sat:138,con:128,
    softFocus:4,caAmount:1.2,hlThreshold:188,hlStrength:2.2,barrel:0.04},
  'dsi':{label:'DSi CAM',tint:[16,8,-6],colorNoise:true,highlight:0.18,
    vignette:0.60,lcd:true,noise:55,res:2,sat:90,con:100,
    softFocus:10,caAmount:3.5,hlThreshold:175,hlStrength:2.0,barrel:0.08},
};

// ===================== STATE =====================
let current='3ds',facing='environment',stream=null,raf=null,running=false;
let photos=[]; // {blobUrl, device, type:'photo'|'video'}
let selectedPhoto=0;
let zoomLevel=1.0,pinchStartDist=null,pinchStartZoom=1.0;
let isRecording=false,mediaRecorder=null,recChunks=[],recTimer=null,recSec=0;
// メモリ管理: 最大保持枚数
const MAX_PHOTOS=20;

// ===================== ELEMENTS =====================
const video=document.getElementById('main-video');
const fcv=document.getElementById('main-fcv');
const ocv=document.getElementById('main-ocv');
const fCtx=fcv.getContext('2d');
const oCtx=ocv.getContext('2d');
const noCam=document.getElementById('no-cam');
const flash=document.getElementById('cam-flash');
const strip=document.getElementById('gallery-strip');
const devLbl=document.getElementById('dev-label-txt');
const toast=document.getElementById('toast');
const shutterBtn=document.getElementById('shutter-btn');
const shutterInner=document.getElementById('shutter-inner');
const recIndicator=document.getElementById('rec-indicator');
const recTimeEl=document.getElementById('rec-time');
const zoomIndicator=document.getElementById('zoom-indicator');

// ===================== UTILS =====================
function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),2200);
}

function jpegDegrade(canvas,q){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.src=canvas.toDataURL('image/jpeg',q);
  });
}

function softFocus(ctx,w,h,amount){
  if(amount<=0)return;
  const sf=Math.max(0.3,1-amount*0.015);
  const sw=Math.max(8,Math.floor(w*sf)),sh=Math.max(6,Math.floor(h*sf));
  const tmp=document.createElement('canvas');
  tmp.width=w;tmp.height=h;
  tmp.getContext('2d').drawImage(ctx.canvas,0,0);
  const small=document.createElement('canvas');
  small.width=sw;small.height=sh;
  const sCtx=small.getContext('2d');
  sCtx.imageSmoothingEnabled=true;sCtx.imageSmoothingQuality='low';
  sCtx.drawImage(tmp,0,0,sw,sh);
  ctx.clearRect(0,0,w,h);
  ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='low';
  ctx.drawImage(small,0,0,w,h);
  ctx.imageSmoothingEnabled=false;
}

function applyCA(ctx,w,h,amount){
  if(!amount)return;
  const id=ctx.getImageData(0,0,w,h);
  const src=new Uint8ClampedArray(id.data),dst=id.data;
  const sh=Math.round(amount);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      const rx=Math.min(w-1,x+sh),ri=(y*w+rx)*4;
      const bx=Math.max(0,x-sh),bi=(y*w+bx)*4;
      dst[i]=src[ri];dst[i+1]=src[i+1];dst[i+2]=src[bi+2];
    }
  }
  ctx.putImageData(id,0,0);
}

// 樽型歪曲収差
function applyBarrel(ctx,w,h,k){
  if(!k)return;
  const id=ctx.getImageData(0,0,w,h);
  const src=new Uint8ClampedArray(id.data),dst=id.data;
  const cx=w/2,cy=h/2;
  const maxR=Math.sqrt(cx*cx+cy*cy);
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      const nx=(x-cx)/maxR,ny=(y-cy)/maxR;
      const r2=nx*nx+ny*ny;
      const scale=1+k*r2;
      const sx=Math.round(nx*scale*maxR+cx);
      const sy=Math.round(ny*scale*maxR+cy);
      const di=(y*w+x)*4;
      if(sx>=0&&sx<w&&sy>=0&&sy<h){
        const si=(sy*w+sx)*4;
        dst[di]=src[si];dst[di+1]=src[si+1];dst[di+2]=src[si+2];dst[di+3]=src[si+3];
      }
    }
  }
  ctx.putImageData(id,0,0);
}

function processPixels(offCtx,dw,dh,d,noise,dev){
  const id=offCtx.getImageData(0,0,dw,dh);
  const px=id.data,tc=TONE[dev];
  for(let i=0;i<px.length;i+=4){
    let r=tc.r[px[i]],g=tc.g[px[i+1]],b=tc.b[px[i+2]];
    r+=d.tint[0];g+=d.tint[1];b+=d.tint[2];
    if(noise>0){
      if(d.colorNoise){
        r+=(Math.random()-.5)*noise*2.2;
        g+=(Math.random()-.5)*noise*1.8;
        b+=(Math.random()-.5)*noise*2.5;
      } else {
        const n=(Math.random()-.5)*noise*1.6;r+=n;g+=n;b+=n;
      }
    }
    const lum=0.299*r+0.587*g+0.114*b;
    if(lum>d.hlThreshold){
      const t=Math.min(1,(lum-d.hlThreshold)/(255-d.hlThreshold));
      r=Math.min(255,r*(1+t*(d.hlStrength-1)));
      g=Math.min(255,g*(1+t*(d.hlStrength-1)*0.7));
      b=Math.min(255,b*(1+t*(d.hlStrength-1)*0.5));
    }
    px[i]=Math.max(0,Math.min(255,r));
    px[i+1]=Math.max(0,Math.min(255,g));
    px[i+2]=Math.max(0,Math.min(255,b));
  }
  offCtx.putImageData(id,0,0);
}

// ===================== CAMERA =====================
function getParams(){
  return{
    noise:+document.getElementById('sl-noise').value,
    res:  +document.getElementById('sl-res').value,
    sat:  +document.getElementById('sl-sat').value/100,
    con:  +document.getElementById('sl-con').value/100,
  };
}

async function startCamera(){
  try{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1280},height:{ideal:960}},audio:true
    });
    video.srcObject=stream;
    await video.play();
    video.style.display='block';
    fcv.style.display='block';
    ocv.style.display='block';
    noCam.style.display='none';
    running=true;
    if(raf)cancelAnimationFrame(raf);
    loop();
  }catch(e){
    document.querySelector('#no-cam p').textContent='カメラへのアクセスが拒否されました';
  }
}

function loop(){
  if(!running)return;
  raf=requestAnimationFrame(loop);
  if(video.readyState<2)return;
  const d=DEV[current],p=getParams();
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const SCALES=[1,.85,.70,.55,.45,.38,.32,.27,.22,.18];
  const scale=SCALES[Math.min(p.res-1,9)];
  const dw=Math.max(16,Math.floor(vw*scale)),dh=Math.max(12,Math.floor(vh*scale));
  fcv.width=vw;fcv.height=vh;
  const off=new OffscreenCanvas(dw,dh);
  const offCtx=off.getContext('2d');
  offCtx.filter=`saturate(${p.sat}) contrast(${p.con}) brightness(${1+d.highlight})`;
  const srcW=vw/zoomLevel,srcH=vh/zoomLevel;
  const srcX=(vw-srcW)/2,srcY=(vh-srcH)/2;
  offCtx.drawImage(video,srcX,srcY,srcW,srcH,0,0,dw,dh);
  processPixels(offCtx,dw,dh,d,p.noise,current);
  fCtx.imageSmoothingEnabled=false;
  fCtx.drawImage(off,0,0,vw,vh);
  applyCA(fCtx,vw,vh,d.caAmount);
  applyBarrel(fCtx,vw,vh,d.barrel||0);
  softFocus(fCtx,vw,vh,d.softFocus);
  ocv.width=vw;ocv.height=vh;
  oCtx.clearRect(0,0,vw,vh);
  if(d.vignette>0){
    const g=oCtx.createRadialGradient(vw/2,vh/2,vh*.12,vw/2,vh/2,vh*.75);
    g.addColorStop(0,'rgba(0,0,0,0)');
    g.addColorStop(1,`rgba(0,0,0,${d.vignette})`);
    oCtx.fillStyle=g;oCtx.fillRect(0,0,vw,vh);
  }
  if(d.lcd){
    oCtx.fillStyle='rgba(0,0,0,0.045)';
    const lh=Math.max(1,Math.floor(vh/90));
    for(let y=0;y<vh;y+=lh*2)oCtx.fillRect(0,y,vw,lh);
  }
}

// ===================== MEMORY MANAGEMENT =====================
function addPhoto(blobUrl,device,type){
  // 古い写真のBlobURLを解放してメモリを回収
  if(photos.length>=MAX_PHOTOS){
    const old=photos.pop();
    URL.revokeObjectURL(old.blobUrl);
    // stripからも削除
    const thumbs=strip.querySelectorAll('.strip-thumb');
    if(thumbs.length>0)thumbs[thumbs.length-1].remove();
  }
  photos.unshift({blobUrl,device,type});
}

// ===================== CAPTURE (PHOTO) =====================
async function capturePhoto(){
  if(!running)return;
  flash.style.opacity='0.75';
  setTimeout(()=>{flash.style.opacity='0';},100);
  const snap=document.createElement('canvas');
  snap.width=fcv.width;snap.height=fcv.height;
  const sCtx=snap.getContext('2d');
  sCtx.drawImage(fcv,0,0);sCtx.drawImage(ocv,0,0);
  const d=DEV[current];
  applyCA(sCtx,snap.width,snap.height,(d.caAmount||0)*1.4);
  applyBarrel(sCtx,snap.width,snap.height,(d.barrel||0)*1.2);
  softFocus(sCtx,snap.width,snap.height,d.softFocus||8);
  const deg1=await jpegDegrade(snap,JPEG_Q[current]);
  sCtx.drawImage(deg1,0,0);
  const deg2=await jpegDegrade(snap,JPEG_Q[current]+0.1);
  sCtx.drawImage(deg2,0,0);

  // BlobURLで管理（base64より大幅にメモリ効率が良い）
  snap.toBlob(blob=>{
    const blobUrl=URL.createObjectURL(blob);
    addPhoto(blobUrl,current,'photo');
    addToStrip(blobUrl,'photo');
    updateGalleryGrid();
    showToast('撮影完了 — 長押しでカメラロールに保存');
  },'image/jpeg',0.75);
}

// ===================== VIDEO RECORDING =====================
function startRecording(){
  if(!stream)return;
  // canvasストリームとオーディオを合成
  const canvasStream=fcv.captureStream(30);
  const audioTrack=stream.getAudioTracks()[0];
  const tracks=[...canvasStream.getTracks()];
  if(audioTrack)tracks.push(audioTrack);
  const combined=new MediaStream(tracks);

  const mimeType=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ?'video/webm;codecs=vp9':'video/webm';
  mediaRecorder=new MediaRecorder(combined,{mimeType,videoBitsPerSecond:2500000});
  recChunks=[];
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  mediaRecorder.onstop=()=>{
    const blob=new Blob(recChunks,{type:'video/webm'});
    const blobUrl=URL.createObjectURL(blob);
    addPhoto(blobUrl,current,'video');
    addToStrip(blobUrl,'video');
    updateGalleryGrid();
    showToast('動画を保存しました');
  };
  mediaRecorder.start(100);
  isRecording=true;
  recSec=0;
  shutterBtn.classList.add('recording');
  recIndicator.classList.add('show');
  recTimer=setInterval(()=>{
    recSec++;
    const m=String(Math.floor(recSec/60)).padStart(2,'0');
    const s=String(recSec%60).padStart(2,'0');
    recTimeEl.textContent=m+':'+s;
  },1000);
}

function stopRecording(){
  if(!mediaRecorder)return;
  mediaRecorder.stop();
  isRecording=false;
  shutterBtn.classList.remove('recording');
  recIndicator.classList.remove('show');
  clearInterval(recTimer);
}

// ===================== STRIP =====================
function addToStrip(blobUrl,type){
  const hint=strip.querySelector('.strip-hint');
  const el=type==='video'
    ? Object.assign(document.createElement('video'),{src:blobUrl,muted:true,loop:true,playsInline:true})
    : Object.assign(document.createElement('img'),{src:blobUrl});
  el.className='strip-thumb';
  if(type==='video')el.play();
  el.addEventListener('click',()=>openGallery(photos.findIndex(p=>p.blobUrl===blobUrl)));
  if(hint)strip.insertBefore(el,hint.nextSibling);
  else strip.prepend(el);
}

// ===================== GALLERY =====================
function openGallery(idx=0){
  selectedPhoto=Math.max(0,Math.min(idx,photos.length-1));
  document.getElementById('gallery-mode').classList.add('open');
  renderShellPreview();
  updateGalleryGrid();
}
function closeGallery(){
  document.getElementById('gallery-mode').classList.remove('open');
}

function getScreenContent(photo){
  if(photo.type==='video'){
    return `<video src="${photo.blobUrl}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;display:block;"></video>`;
  }
  return `<img src="${photo.blobUrl}">`;
}

function renderShellPreview(){
  const wrap=document.getElementById('shell-preview-wrap');
  if(!photos.length){wrap.innerHTML='';return;}
  const photo=photos[selectedPhoto];
  const content=getScreenContent(photo);
  let html='';
  if(photo.device==='3ds'){
    html=`<div class="gshell-3ds"><div class="gtop">
      <div class="gcam-dot"></div><div class="glabel">NINTENDO 3DS</div>
      <div class="gscreen">${content}</div>
      <div class="gspeakers">
        <div class="gspk"><div class="gspk-dot"></div><div class="gspk-dot"></div><div class="gspk-dot"></div></div>
        <div class="gspk"><div class="gspk-dot"></div><div class="gspk-dot"></div><div class="gspk-dot"></div></div>
      </div></div><div class="ghinge"></div>
      <div class="gbottom"><div class="gbtns">
        <div class="gcpad"></div><div style="flex:1"></div>
        <div class="gabxy">
          <div class="gabxy-btn" style="background:#4488cc">X</div>
          <div class="gabxy-btn" style="background:#cc4444">A</div>
          <div class="gabxy-btn" style="background:#44aa44">B</div>
          <div class="gabxy-btn" style="background:#cc8844">Y</div>
        </div></div></div></div>`;
  } else if(photo.device==='vita'){
    html=`<div class="gshell-vita">
      <div class="gvita-led"></div>
      <div class="gvita-shoulder"><div class="gvita-sb"></div><div class="gvita-sb"></div></div>
      <div class="gvita-main">
        <div class="gvita-stick"></div>
        <div class="gscreen">${content}</div>
        <div class="gvita-abxy">
          <div class="gvita-btn" style="background:#4488cc">□</div>
          <div class="gvita-btn" style="background:#cc4444">△</div>
          <div class="gvita-btn" style="background:#44aa44">×</div>
          <div class="gvita-btn" style="background:#cc8844">○</div>
        </div></div></div>`;
  } else {
    html=`<div class="gshell-dsi"><div class="gdtop">
      <div class="gdcam"></div><div class="gdlabel">Nintendo DSi</div>
      <div class="gscreen">${content}</div></div>
      <div class="gdhinge"></div>
      <div class="gdbottom" style="height:36px"></div></div>`;
  }
  wrap.innerHTML=html;
}

function updateGalleryGrid(){
  const grid=document.getElementById('gallery-grid');
  grid.innerHTML='';
  photos.forEach((p,i)=>{
    let el;
    if(p.type==='video'){
      el=document.createElement('video');
      el.src=p.blobUrl;el.muted=true;el.loop=true;el.playsInline=true;
      el.style.cssText='aspect-ratio:4/3;object-fit:cover;cursor:pointer;border-radius:2px;width:100%;';
      el.play();
    } else {
      el=document.createElement('img');
      el.src=p.blobUrl;
    }
    el.className='ggrid-item'+(i===selectedPhoto?' ggrid-selected':'');
    el.addEventListener('click',()=>{
      selectedPhoto=i;renderShellPreview();
      document.querySelectorAll('.ggrid-item').forEach((e,j)=>e.classList.toggle('ggrid-selected',j===i));
    });
    grid.appendChild(el);
  });
}

// ===================== ZOOM =====================
let zoomHideTimer=null;
function showZoom(){
  zoomIndicator.textContent=zoomLevel.toFixed(1)+'×';
  zoomIndicator.style.opacity='1';
  clearTimeout(zoomHideTimer);
  zoomHideTimer=setTimeout(()=>{zoomIndicator.style.opacity='0';},1500);
}
function getDist(t){
  const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
document.getElementById('cam-bg').addEventListener('touchstart',e=>{
  if(e.touches.length===2){e.preventDefault();pinchStartDist=getDist(e.touches);pinchStartZoom=zoomLevel;}
},{passive:false});
document.getElementById('cam-bg').addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    e.preventDefault();
    zoomLevel=Math.max(1,Math.min(4,pinchStartZoom*getDist(e.touches)/pinchStartDist));
    showZoom();
  }
},{passive:false});
document.getElementById('cam-bg').addEventListener('touchend',e=>{
  if(e.touches.length<2)pinchStartDist=null;
});

// ===================== SHUTTER (long press = video) =====================
let shutterPressTimer=null;
let shutterLongPressed=false;

shutterBtn.addEventListener('touchstart',e=>{
  e.preventDefault();
  shutterLongPressed=false;
  shutterPressTimer=setTimeout(()=>{
    shutterLongPressed=true;
    if(!isRecording)startRecording();
  },400);
},{passive:false});

shutterBtn.addEventListener('touchend',e=>{
  e.preventDefault();
  clearTimeout(shutterPressTimer);
  if(isRecording){stopRecording();}
  else if(!shutterLongPressed){capturePhoto();}
});

// マウスでも動くように
shutterBtn.addEventListener('mousedown',()=>{
  shutterLongPressed=false;
  shutterPressTimer=setTimeout(()=>{
    shutterLongPressed=true;
    if(!isRecording)startRecording();
  },400);
});
shutterBtn.addEventListener('mouseup',()=>{
  clearTimeout(shutterPressTimer);
  if(isRecording){stopRecording();}
  else if(!shutterLongPressed){capturePhoto();}
});

// ===================== DEVICE SWITCH =====================
function switchDevice(dev){
  current=dev;
  const d=DEV[dev];
  devLbl.textContent=d.label;
  setSlider('noise',d.noise);setSlider('res',d.res);
  setSlider('sat',d.sat);setSlider('con',d.con);
}
function setSlider(id,val){
  document.getElementById('sl-'+id).value=val;
  document.getElementById('sv-'+id).textContent=val;
}

// ===================== EVENTS =====================
document.getElementById('start-btn').addEventListener('click',startCamera);
document.getElementById('flip-btn').addEventListener('click',async()=>{
  facing=facing==='environment'?'user':'environment';
  if(running)await startCamera();
});
document.getElementById('gallery-mode-btn').addEventListener('click',()=>openGallery(0));
document.getElementById('gallery-back').addEventListener('click',closeGallery);
document.querySelectorAll('.dev-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.dev-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');switchDevice(btn.dataset.device);
  });
});
document.getElementById('settings-btn').addEventListener('click',()=>{
  document.getElementById('settings-panel').classList.add('open');
});
document.getElementById('settings-close').addEventListener('click',()=>{
  document.getElementById('settings-panel').classList.remove('open');
});
['noise','res','sat','con'].forEach(id=>{
  document.getElementById('sl-'+id).addEventListener('input',e=>{
    document.getElementById('sv-'+id).textContent=e.target.value;
  });
});

switchDevice('3ds');
</script>
