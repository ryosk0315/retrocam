<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RetroCam — 3DS / PS Vita / DSi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --surface: #1a1a22;
    --surface2: #24242e;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --text: #f0eefc;
    --text-muted: #7a7890;
    --accent: #7f6fe0;
    --radius: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 32px;
    gap: 14px;
    min-height: 100dvh;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 380px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    border: 0.5px solid var(--border-strong);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* Device selector */
  .device-selector {
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 24px;
    padding: 4px;
    width: 100%;
    max-width: 380px;
  }

  .dev-btn {
    flex: 1;
    border: none;
    background: transparent;
    border-radius: 20px;
    padding: 8px 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.5px;
  }
  .dev-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 0.5px solid var(--border-strong);
  }

  /* Viewfinder */
  .viewfinder-wrap {
    position: relative;
    width: 100%;
    max-width: 380px;
  }

  .device-frame {
    position: absolute;
    inset: -8px;
    border-radius: 16px;
    border: 5px solid var(--frame-color, #6a6080);
    pointer-events: none;
    z-index: 10;
    transition: border-color 0.3s;
  }

  .viewfinder {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    overflow: hidden;
    border-radius: 6px;
    background: #000;
    cursor: pointer;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #filter-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: none;
  }

  #overlay-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    display: none;
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 8px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    z-index: 5;
    pointer-events: none;
  }
  .hud-text {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    opacity: 0.85;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    letter-spacing: 0.8px;
  }

  /* No camera state */
  .no-cam {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--surface);
  }
  .no-cam svg { opacity: 0.4; }
  .no-cam p {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
    padding: 0 20px;
  }
  .no-cam button {
    margin-top: 4px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .no-cam button:hover { opacity: 0.85; }

  #flash {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.05s;
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .shutter-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .shutter-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: 3px solid var(--border-strong);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  .shutter-btn:active { transform: scale(0.90); background: var(--surface); }
  .shutter-btn svg { pointer-events: none; }

  .icon-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 0.5px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.91); }

  /* Sliders */
  .sliders {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sl-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sl-label {
    font-size: 11px;
    color: var(--text-muted);
    width: 56px;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .sl-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border-strong);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .sl-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .sl-val {
    font-size: 11px;
    font-family: 'Courier New', monospace;
    color: var(--text-muted);
    width: 30px;
    text-align: right;
  }

  /* Gallery */
  .gallery-section {
    width: 100%;
    max-width: 380px;
  }
  .gallery-header {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
  }
  .gallery-grid img {
    aspect-ratio: 4/3;
    object-fit: cover;
    border-radius: 4px;
    cursor: pointer;
    border: 0.5px solid var(--border);
    transition: opacity 0.15s;
  }
  .gallery-grid img:hover { opacity: 0.8; }
  .gallery-empty {
    font-size: 12px;
    color: var(--text-muted);
    grid-column: 1/-1;
    text-align: center;
    padding: 16px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Retro<span>Cam</span></div>
  <div class="badge">BETA</div>
</header>

<div class="device-selector">
  <button class="dev-btn active" data-device="3ds">3DS</button>
  <button class="dev-btn" data-device="vita">PS Vita</button>
  <button class="dev-btn" data-device="dsi">DSi</button>
</div>

<div class="viewfinder-wrap">
  <div class="device-frame" id="device-frame"></div>
  <div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="filter-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div class="hud">
      <span class="hud-text" id="hud-device">3DS CAM</span>
      <span class="hud-text" id="hud-time">00:00</span>
    </div>
    <div id="flash"></div>
    <div class="no-cam" id="no-cam">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="13" r="4" stroke="#fff" stroke-width="1.5"/>
      </svg>
      <p>カメラへのアクセスを許可して<br>撮影をはじめてください</p>
      <button id="start-cam-btn">カメラを起動する</button>
    </div>
  </div>
</div>

<div class="controls">
  <div class="shutter-row">
    <button class="icon-btn" id="flip-btn" title="カメラ切り替え">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
        <path d="M1 4v6h6M23 20v-6h-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="shutter-btn" id="shutter-btn" title="撮影">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="#fff" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="6" fill="#fff" opacity="0.85"/>
      </svg>
    </button>

    <button class="icon-btn" id="dl-btn" title="最新写真をダウンロード">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="sliders">
    <div class="sl-row">
      <span class="sl-label">ノイズ</span>
      <input type="range" id="sl-noise" min="0" max="100" value="40" step="1">
      <span class="sl-val" id="sv-noise">40</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">解像度</span>
      <input type="range" id="sl-res" min="1" max="10" value="3" step="1">
      <span class="sl-val" id="sv-res">3</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">彩度</span>
      <input type="range" id="sl-sat" min="0" max="200" value="130" step="1">
      <span class="sl-val" id="sv-sat">130</span>
    </div>
    <div class="sl-row">
      <span class="sl-label">コントラスト</span>
      <input type="range" id="sl-con" min="50" max="200" value="120" step="1">
      <span class="sl-val" id="sv-con">120</span>
    </div>
  </div>
</div>

<div class="gallery-section">
  <div class="gallery-header">撮った写真</div>
  <div class="gallery-grid" id="gallery">
    <div class="gallery-empty">まだ写真がありません</div>
  </div>
</div>

<script>
(function () {
  const video = document.getElementById('video');
  const filterCanvas = document.getElementById('filter-canvas');
  const fCtx = filterCanvas.getContext('2d');
  const overlayCanvas = document.getElementById('overlay-canvas');
  const oCtx = overlayCanvas.getContext('2d');
  const noCam = document.getElementById('no-cam');
  const flash = document.getElementById('flash');
  const gallery = document.getElementById('gallery');
  const frame = document.getElementById('device-frame');
  const hudDevice = document.getElementById('hud-device');
  const hudTime = document.getElementById('hud-time');

  let stream = null;
  let facing = 'environment';
  let running = false;
  let raf = null;
  let lastPhoto = null;

  const DEVICES = {
    '3ds': {
      label: '3DS CAM',
      frameColor: '#8a78a0',
      noise: 42, res: 3, sat: 115, con: 120,
      tint: [0, 0, 18],
      vignette: 0.52,
      lcd: true,
    },
    'vita': {
      label: 'VITA CAM',
      frameColor: '#1a1a3a',
      noise: 22, res: 5, sat: 148, con: 132,
      tint: [2, 0, 10],
      vignette: 0.30,
      lcd: false,
    },
    'dsi': {
      label: 'DSi CAM',
      frameColor: '#c0b090',
      noise: 58, res: 2, sat: 98, con: 108,
      tint: [14, 8, 0],
      vignette: 0.62,
      lcd: true,
    }
  };

  let currentDevice = '3ds';

  function applyDevice(key) {
    currentDevice = key;
    const d = DEVICES[key];
    frame.style.borderColor = d.frameColor;
    hudDevice.textContent = d.label;
    setSlider('noise', d.noise);
    setSlider('res', d.res);
    setSlider('sat', d.sat);
    setSlider('con', d.con);
  }

  function setSlider(id, val) {
    document.getElementById('sl-' + id).value = val;
    document.getElementById('sv-' + id).textContent = val;
  }

  document.querySelectorAll('.dev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dev-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyDevice(btn.dataset.device);
    });
  });

  ['noise', 'res', 'sat', 'con'].forEach(id => {
    document.getElementById('sl-' + id).addEventListener('input', e => {
      document.getElementById('sv-' + id).textContent = e.target.value;
    });
  });

  function getParams() {
    return {
      noise: +document.getElementById('sl-noise').value,
      res:   +document.getElementById('sl-res').value,
      sat:   +document.getElementById('sl-sat').value / 100,
      con:   +document.getElementById('sl-con').value / 100,
    };
  }

  function updateTime() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    hudTime.textContent = h + ':' + m;
  }
  updateTime();
  setInterval(updateTime, 15000);

  async function startCamera() {
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      video.style.display = 'block';
      filterCanvas.style.display = 'block';
      overlayCanvas.style.display = 'block';
      noCam.style.display = 'none';
      running = true;
      loop();
    } catch (e) {
      document.querySelector('.no-cam p').textContent = 'カメラへのアクセスが拒否されました。ブラウザの設定を確認してください。';
    }
  }

  function loop() {
    if (!running) return;
    raf = requestAnimationFrame(loop);
    if (video.readyState < 2) return;

    const vw = video.videoWidth || 640;
    const vh = video.videoHeight || 480;
    const p = getParams();
    const d = DEVICES[currentDevice];

    const SCALES = [1, 0.88, 0.72, 0.58, 0.48, 0.40, 0.34, 0.28, 0.24, 0.20];
    const scale = SCALES[Math.min(p.res - 1, 9)];
    const dw = Math.max(16, Math.floor(vw * scale));
    const dh = Math.max(12, Math.floor(vh * scale));

    filterCanvas.width = vw;
    filterCanvas.height = vh;

    const off = new OffscreenCanvas(dw, dh);
    const offCtx = off.getContext('2d');
    offCtx.filter = `saturate(${p.sat}) contrast(${p.con})`;
    offCtx.drawImage(video, 0, 0, dw, dh);

    const img = offCtx.getImageData(0, 0, dw, dh);
    const px = img.data;
    const noiseAmt = p.noise;

    for (let i = 0; i < px.length; i += 4) {
      let r = px[i] + d.tint[0];
      let g = px[i+1] + d.tint[1];
      let b = px[i+2] + d.tint[2];
      if (noiseAmt > 0) {
        const n = (Math.random() - 0.5) * noiseAmt * 1.8;
        r += n; g += n; b += n;
      }
      px[i]   = Math.max(0, Math.min(255, r));
      px[i+1] = Math.max(0, Math.min(255, g));
      px[i+2] = Math.max(0, Math.min(255, b));
    }
    offCtx.putImageData(img, 0, 0);

    fCtx.imageSmoothingEnabled = false;
    fCtx.drawImage(off, 0, 0, vw, vh);

    drawOverlay(vw, vh, d);
  }

  function drawOverlay(w, h, d) {
    overlayCanvas.width = w;
    overlayCanvas.height = h;
    oCtx.clearRect(0, 0, w, h);

    if (d.vignette > 0) {
      const g = oCtx.createRadialGradient(w/2, h/2, h*0.15, w/2, h/2, h*0.72);
      g.addColorStop(0, 'rgba(0,0,0,0)');
      g.addColorStop(1, `rgba(0,0,0,${d.vignette})`);
      oCtx.fillStyle = g;
      oCtx.fillRect(0, 0, w, h);
    }

    if (d.lcd) {
      oCtx.fillStyle = 'rgba(0,0,0,0.04)';
      const lh = Math.max(1, Math.floor(h / 100));
      for (let y = 0; y < h; y += lh * 2) {
        oCtx.fillRect(0, y, w, lh);
      }
    }
  }

  function capture() {
    if (!running) return;

    flash.style.opacity = '0.75';
    setTimeout(() => { flash.style.opacity = '0'; }, 100);

    const snap = document.createElement('canvas');
    snap.width = filterCanvas.width;
    snap.height = filterCanvas.height;
    const sCtx = snap.getContext('2d');
    sCtx.drawImage(filterCanvas, 0, 0);
    sCtx.drawImage(overlayCanvas, 0, 0);

    const dataURL = snap.toDataURL('image/jpeg', 0.90);
    lastPhoto = dataURL;
    addGallery(dataURL);
  }

  function addGallery(url) {
    const empty = gallery.querySelector('.gallery-empty');
    if (empty) empty.remove();

    const img = document.createElement('img');
    img.src = url;
    img.title = 'タップでダウンロード';
    img.addEventListener('click', () => downloadURL(url));
    gallery.prepend(img);
  }

  function downloadURL(url) {
    const a = document.createElement('a');
    a.href = url;
    a.download = 'retrocam_' + currentDevice + '_' + Date.now() + '.jpg';
    a.click();
  }

  document.getElementById('start-cam-btn').addEventListener('click', startCamera);
  document.getElementById('shutter-btn').addEventListener('click', capture);
  document.getElementById('flip-btn').addEventListener('click', async () => {
    facing = facing === 'environment' ? 'user' : 'environment';
    if (running) await startCamera();
  });
  document.getElementById('dl-btn').addEventListener('click', () => {
    if (lastPhoto) downloadURL(lastPhoto);
  });

  applyDevice('3ds');
})();
</script>
</body>
</html>
